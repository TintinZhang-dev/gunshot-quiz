<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="枪声盲听训练工具 — Train your ear to identify firearms by sound">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>枪声盲听训练 | Gunshot Blind Quiz</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Preload fonts (optional, uncomment if using custom font files) -->
  <!-- <link rel="preload" href="fonts/jetbrains-mono.woff2" as="font" crossorigin> -->

  <!-- Favicon (inline SVG crosshair) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title">枪声盲听训练</h1>
    <p class="app-subtitle">训练耳朵辨别不同枪型</p>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="app-nav">
    <button class="nav-tab active" data-tab="quiz">盲听猜枪</button>
    <button class="nav-tab" data-tab="compare">A/B 对比</button>
    <button class="nav-tab" data-tab="learn">学习模式</button>
    <button class="nav-tab" data-tab="stats">成绩统计</button>
  </nav>

  <!-- Main Content -->
  <main class="app-content" id="app-content">
    <!-- Dynamically rendered by app.js -->
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    ⚠️ 音源来自网络公开资源，仅供学习训练使用。请支持正版。
  </footer>

  <!-- Scripts (order matters — dependencies first, then modules, then app) -->
  <script src="js/i18n.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/learn.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
